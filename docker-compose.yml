# Stack para Dokploy: app (Bun, un proceso: UI + API) + PostgreSQL.
# Las variables se setean en el panel de Dokploy (ver .env.example).

services:
  app:
    build:
      context: .
      args:
        VITE_SERVER_URL: ${APP_URL:-https://buenasmigas.dalvae.cl}
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/buenasmigas
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_URL:-https://buenasmigas.dalvae.cl}
      CORS_ORIGIN: ${APP_URL:-https://buenasmigas.dalvae.cl}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@buenasmigas.cl}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "3000"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: buenasmigas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
